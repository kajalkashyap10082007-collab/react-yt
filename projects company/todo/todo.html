<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let isEditing = false;
let currentEditingDivId = null;
let mytasks = [];

let box = creatediv1();
document.body.appendChild(box);

let box1 = creatediv2();
let box2 = creatediv3();
let btn = createbutton();
let form = createform();
let box3 = creatediv4();

box.appendChild(box1);
box.appendChild(box2);
box1.appendChild(btn);
box1.appendChild(form);
box2.appendChild(box3);

// Layout Divs
function creatediv1() {
    let box = document.createElement("div");
    box.style.background = "linear-gradient(to right,yellow,pink,red)";
    return box;
}
function creatediv2() {
    let box1 = document.createElement("div");
    box1.style.border = "2px solid black";
    box1.style.height = "600px";
    box1.style.width = "600px";
    box1.style.marginLeft = "12%";
    box1.style.marginTop = "4%";
    box1.style.display = "inline-block";
    box1.style.verticalAlign = "top";
    // box1.style.backgroundColor = "#a4d1c2ee";
    return box1;
}
function creatediv3() {
    let box2 = document.createElement("div");
    box2.style.border = "2px solid black";
    box2.style.height = "600px";
    box2.style.width = "600px";
    box2.style.marginLeft = "4%";
    box2.style.marginTop = "4%";
    box2.style.display = "inline-block";
    box2.style.verticalAlign = "top";
    // box2.style.backgroundColor = "#c59dc5ff";
    return box2;
}

// Buttons and Form
function createbutton() {
    let btn = document.createElement("button");
    btn.style.height = "50px";
    btn.style.width = "200px";
    btn.style.marginLeft = "30%";
    btn.style.marginTop = "5%";
    btn.innerText = "ADD";
    btn.style.border = "3px solid black";
    // btn.style.backgroundColor = "#FFDDA0DD";
    btn.style.color = "black";
    btn.onclick = mybtn;
    return btn;
}
function createform() {
    let div = document.createElement("div");
    div.id = "div1";

    let input = createinput();
    input.id = "myinput";

    let textarea = createtextarea();
    textarea.id = "mytextarea";

    let button = createtaskbutton();
    button.id = "my-btn";

    div.appendChild(input);
    div.appendChild(textarea);
    div.appendChild(button);

    div.style.display = "none";
    return div;
}
function createinput() {
    let input = document.createElement("input");
    input.placeholder = "Enter your title";
    input.style.height = "80px";
    input.style.width = "350px";
    input.style.border = "2px solid black";
    input.style.marginLeft = "120px";
    input.style.marginTop = "70px";
    return input;
}
function createtextarea() {
    let textarea = document.createElement("textarea");
    textarea.placeholder = "Enter your text message";
    textarea.style.height = "150px";
    textarea.style.width = "350px";
    textarea.style.border = "2px solid black";
    textarea.style.marginLeft = "121px";
    textarea.style.marginTop = "70px";
    return textarea;
}
function createtaskbutton() {
    let button = document.createElement("button");
    button.style.height = "50px";
    button.style.width = "250px";
    button.style.marginLeft = "25%";
    button.style.marginTop = "7%";
    button.innerText = "ADD TASK";
    button.style.border = "2px solid black";
    button.addEventListener("click", mybtn2);
    return button;
}
function creatediv4() {
    let box3 = document.createElement("div");
    box3.id = "divDisplay";
    box3.style.border = "2px solid black";
    box3.style.height = "500px";
    box3.style.width = "90%";
    box3.style.marginLeft = "5%";
    box3.style.marginTop = "8%";
    box3.style.overflowY = "auto";
    return box3;
}

// Show/Hide
function mybtn() {
    document.getElementById("myinput").style.display = "block";
    document.getElementById("mytextarea").style.display = "block";
    form.style.display = "block";
}

// Add/Edit Logic
function mybtn2() {
    let inputVal = document.getElementById("myinput").value;
   let textVal = document.getElementById("mytextarea").value;
    if (!inputVal || !textVal) return;
    if (isEditing) {
        saveEditing(inputVal, textVal, currentEditingDivId);
    } else {
        saveToStorage(inputVal, textVal);
    }
    document.getElementById("myinput").value = "";
    document.getElementById("mytextarea").value = "";
    form.style.display = "none";
}

// Save Task
function saveToStorage(titleVal, textVal) {
    let t = {
        id: Date.now().toString(),
        title: titleVal,
        description: textVal,
    };
    mytasks.push(t);
    localStorage.setItem("mytasks", JSON.stringify(mytasks));
    createDisplayBox(t);
}

function saveEditing(inputVal, textVal, editingId) {
    for (let i = 0; i < mytasks.length; i++) {
        if (mytasks[i].id === editingId) {
            mytasks[i].title = inputVal;
            mytasks[i].description = textVal;

            // Update existing display box
            let box = document.getElementById(editingId);
            box.querySelector("h2").innerText = inputVal;
            box.querySelector("p").innerText = textVal;
        }
    }

    localStorage.setItem("mytasks", JSON.stringify(mytasks));
    isEditing = false;
    currentEditingDivId = null;
}

//     localStorage.setItem("mytasks", JSON.stringify(mytasks));
//     createDisplayBox({ id: editingId, title: inputVal, description: textVal });
//     isEditing = false;
//     currentEditingDivId = null;
// }

// Display Box
function createDisplayBox(taskObj) {
    let box = document.createElement("div");
    box.id = taskObj.id;
    box.style.border = "2px dashed black";
    box.style.height = "150px";
    box.style.width = "300px";
    box.style.marginLeft = "15%";
    box.style.marginTop = "5%";
    box.style.display = "inline-block";
    box.style.verticalAlign = "top";
    box.style.padding = "10px";
    // box.style.backgroundColor = "#FFF";

    let title = document.createElement("h2");
    title.innerText = taskObj.title;

    let message = document.createElement("p");
    message.innerText = taskObj.description;

    let del = document.createElement("button");
    del.innerText = "❌";
    del.onclick = () => {
        box.remove();
        mytasks = mytasks.filter((task) => task.id !== taskObj.id);
        localStorage.setItem("mytasks", JSON.stringify(mytasks));
    };

    let edit = document.createElement("button");
    edit.innerText = "✏️";
    edit.style.marginLeft = "10px";
    edit.onclick = () => {
        document.getElementById("myinput").value = taskObj.title;
        document.getElementById("mytextarea").value = taskObj.description;
        isEditing = true;
        currentEditingDivId = taskObj.id;
        form.style.display = "block";
        // box.remove();
    };
    
    let dabba=document.createElement("div");
    dabba.innerText=Conversion(taskObj.id);
    // box.appendChild(dabba);
    

    box.appendChild(title);
    box.appendChild(message);
    box.appendChild(del);
    box.appendChild(edit);
     box.appendChild(dabba);
    box3.appendChild(box);
}
// Load from Local Storage on Reload
function loadTasksFromStorage() {
    let data = localStorage.getItem("mytasks");
    if (data) {
        mytasks = JSON.parse(data);
        for (let task of mytasks) {
            createDisplayBox(task);
        }
    }
}
loadTasksFromStorage();



function Conversion(taskObjid) {
    let navaVar=Date.now();
    let seconds=Math.floor(navaVar-taskObjid)/1000;
    if (seconds<60) {
        return "few seconds ago";
        
    }

   let minutes = Math.floor(seconds / 60);
    if (minutes <60) {
        return `${minutes} minutes ago`;
    }

    let hours =Math.floor (minutes / 60);
    if (hours<24) {
     return` ${hours} hour ago`;
    }

    let days = Math.floor(hours / 24);
    if (days<30) {
        return `${days} days ago`;
    }

    let months =Math.floor (days / 30);
    if (months > 12) {
        return`${months} months ago`;
    }
}
    </script>
</body>
</html>
