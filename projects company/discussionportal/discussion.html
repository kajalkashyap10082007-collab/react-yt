<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
   <script>
    let arr = [];

let mainDiv = document.createElement("div");
mainDiv.className = "m-10 border-2 shadow-2xl rounded-2xl w-[1200px] mx-auto bg-white/60 backdrop-blur-md p-2";
document.body.appendChild(mainDiv);

let header = document.createElement("div");
header.className = "bg-gradient-to-r from-cyan-600 to-blue-500 text-white text-5xl text-center py-6 rounded-t-2xl font-bold shadow-inner";
header.innerText = "💬  Discussion Portal";
mainDiv.appendChild(header);

let badaDiv = document.createElement("div");
badaDiv.className = "flex";
mainDiv.appendChild(badaDiv);

let leftDiv = document.createElement("div");
leftDiv.className = "w-[350px] border-r-2 border-gray-300 p-6 bg-white/40 backdrop-blur-md rounded-bl-2xl";
badaDiv.appendChild(leftDiv);

let innerdiv1 = document.createElement("div");
innerdiv1.className = "mb-6 space-y-6";
leftDiv.appendChild(innerdiv1);

// New Question Button
let quesForm = document.createElement("button");
quesForm.innerText = "➕ New Question";
quesForm.className =
  "bg-gradient-to-r from-teal-400 to-cyan-500 text-white px-6 py-3 w-full text-xl font-semibold rounded-lg hover:scale-105 transition-transform duration-300 shadow";
quesForm.onclick = () => {
  rightDiv.style.display = "block";
  rightdiv2.style.display = "none";
  document.getElementById("subject").focus();
};
innerdiv1.appendChild(quesForm);

// Search Bar
let search = document.createElement("input");
search.placeholder = "   🔍 Search questions...";
search.className =
  "border border-gray-400 rounded-lg px-4 py-3 w-full text-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 shadow ";
innerdiv1.appendChild(search);

// Question List Area
let innerdiv2 = document.createElement("div");
innerdiv2.className = "overflow-y-auto h-[500px] pr-2 space-y-5";
leftDiv.appendChild(innerdiv2);

search.oninput = () => {
  const value = search.value.toLowerCase();
  innerdiv2.innerHTML = "";
  for (let obj of arr) {
    if (
      obj.subject.toLowerCase().includes(value) ||
      obj.question.toLowerCase().includes(value)
    ) {
      createRightDiv2(obj);
    }
  }
};

let rightDiv = document.createElement("div");
rightDiv.className = "w-full p-10 bg-white/50 backdrop-blur-md rounded-br-2xl";
rightDiv.innerHTML = `
  <h1 class="text-4xl font-bold mb-3 text-cyan-800 text-center">Welcome to Discussion Portal!</h1>
  <h3 class="text-xl mb-6 text-center text-gray-700">Enter a subject and question to get started</h3>
`;
badaDiv.appendChild(rightDiv);

// Subject input
let subject = document.createElement("input");
subject.id = "subject";
subject.placeholder = "📓 Subject";
subject.className =
  "w-full border px-4 py-3 text-lg rounded-lg mt-2 focus:outline-none focus:ring-2 focus:ring-cyan-400 shadow";
rightDiv.appendChild(subject);

// Question input
let ques = document.createElement("textarea");
ques.id = "ques";
ques.placeholder = "📝 Type your question here...";
ques.className =
  "w-full border px-4 py-3 text-lg rounded-lg mt-4 h-32 focus:outline-none focus:ring-2 focus:ring-cyan-400 shadow";
rightDiv.appendChild(ques);

// Submit button
let submit = document.createElement("button");
submit.innerText = " Submit";
submit.className =
  "bg-green-500 text-white px-6 py-3 rounded-lg mt-4 text-xl hover:bg-green-600 transition-all duration-300 shadow hover:";
submit.onclick = showRight;
rightDiv.appendChild(submit);

// Response Panel
let rightdiv2 = document.createElement("div");
rightdiv2.className = "w-full p-6 bg-white/50 hidden rounded-br-2xl backdrop-blur-md space-y-6";
badaDiv.appendChild(rightdiv2);

// Function to submit new question
function showRight() {
  let subVal = document.getElementById("subject").value;
  let quesVal = document.getElementById("ques").value;

  if (!subVal || !quesVal) {
    alert("Pura form bharde meri jaan! 🤦‍♀️");
    return;
  }

  let arr2 = {
    id: Date.now(),
    subject: subVal,
    question: quesVal,
    responses: [],
    div: [],
  };
  arr.push(arr2);
  localStorage.setItem("arr", JSON.stringify(arr));
  createRightDiv2(arr2);

  document.getElementById("subject").value = "";
  document.getElementById("ques").value = "";
}

// Render question box
function createRightDiv2(arr2) {
  let div = document.createElement("div");
  div.className =
    "border p-4 rounded-xl shadow-lg bg-white hover:shadow-xl transition cursor-pointer";
  arr2.div = div;

  let subjectVAl = document.createElement("h1");
  subjectVAl.className = "text-xl font-semibold text-blue-700";
  subjectVAl.innerText = arr2.subject;

  let quesVAl = document.createElement("p");
  quesVAl.className = "text-md text-gray-700 mt-1";
  quesVAl.innerText = arr2.question;

  div.appendChild(subjectVAl);
  div.appendChild(quesVAl);
  innerdiv2.appendChild(div);

  div.addEventListener("click", () => {
    rightdiv2.innerHTML = "";
    rightDiv.style.display = "none";
    rightdiv2.style.display = "block";
    let qAndRDiv = createQandRDiv(arr2);
    let responseForm = createResponseForm(arr2);
    rightdiv2.appendChild(qAndRDiv);
    rightdiv2.appendChild(responseForm);
  });
}

// Show question & resolve
function createQandRDiv(arr2) {
  let qAndRDiv = document.createElement("div");
  qAndRDiv.className = "p-6 border rounded-xl bg-white shadow space-y-4";

  let title = document.createElement("h2");
  title.className = "text-2xl font-bold text-gray-800";
  title.innerText = "Question";
  qAndRDiv.appendChild(title);

  let quesDiv = document.createElement("div");
  quesDiv.className = "bg-gray-100 p-4 rounded-lg";
  quesDiv.innerHTML = `<h3 class="text-lg font-semibold">${arr2.subject}</h3><p class="text-gray-700">${arr2.question}</p>`;
  qAndRDiv.appendChild(quesDiv);

  let resolveBtn = document.createElement("button");
  resolveBtn.innerText = "✅ Mark as Resolved";
  resolveBtn.className =
    "bg-red-500 text-white px-5 py-2 rounded-lg hover:bg-red-600";
  resolveBtn.onclick = () => {
    arr = arr.filter((x) => x.id !== arr2.id);
    arr2.div.remove();
    rightdiv2.style.display = "none";
    rightDiv.style.display = "block";
    localStorage.setItem("arr", JSON.stringify(arr));
  };
  qAndRDiv.appendChild(resolveBtn);

  return qAndRDiv;
}

// Add Response form
function createResponseForm(arr2) {
  let container = document.createElement("div");
  container.className = "p-6 border rounded-xl bg-white shadow space-y-5";

  let heading = document.createElement("h2");
  heading.innerText = "💬 Responses";
  heading.className = "text-2xl font-bold text-gray-800";
  container.appendChild(heading);

  let responseList = document.createElement("div");
  responseList.className = "space-y-4";

  arr2.responses.forEach((r) => {
    let box = document.createElement("div");
    box.className = "bg-gray-100 p-3 rounded-lg";
    box.innerHTML = `<h4 class="font-semibold text-lg text-blue-800">${r.name}</h4><p class="text-gray-700">${r.comment}</p>`;
    responseList.appendChild(box);
  });

  let name = document.createElement("input");
  name.id = "nameInput";
  name.placeholder = "👤 Your Name";
  name.className =
    "w-full border px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-300";

  let comment = document.createElement("textarea");
  comment.id = "cmtInput";
  comment.placeholder = "💬 Add your comment...";
  comment.className =
    "w-full border px-4 py-2 rounded-lg h-24 focus:outline-none focus:ring-2 focus:ring-blue-300";

  let submitBtn = document.createElement("button");
  submitBtn.innerText = "✍️ Submit Response";
  submitBtn.className =
    "bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700";
  submitBtn.onclick = () => {
    let n = name.value.trim();
    let c = comment.value.trim();
    if (!n || !c) return alert("Naam aur comment bhar meri jaan 😅");
    let box = document.createElement("div");
    box.className = "bg-gray-100 p-3 rounded-lg";
    box.innerHTML = `<h4 class="font-semibold text-lg text-blue-800">${n}</h4><p class="text-gray-700">${c}</p>`;
    responseList.appendChild(box);
    arr2.responses.push({ name: n, comment: c });
    localStorage.setItem("arr", JSON.stringify(arr));
    name.value = "";
    comment.value = "";
  };

  container.appendChild(responseList);
  container.appendChild(name);
  container.appendChild(comment);
  container.appendChild(submitBtn);
  return container;
}

// Reload saved data
function loadTasks() {
  let data = localStorage.getItem("arr");
  if (data) {
    arr = JSON.parse(data);
    for (let obj of arr) createRightDiv2(obj);
  }
}
loadTasks();
   </script> 
</body>
</html>
